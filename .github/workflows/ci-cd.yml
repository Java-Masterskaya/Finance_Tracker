name: Build, Test and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Джоба 1: Unit-тесты (быстрые, без внешних зависимостей)
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit

  # Джоба 2: Интеграционные тесты (с Postgres и миграциями)
  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Run migrations and integration tests
        run: ./gradlew integrationTest --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:tc:postgresql:15:///testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit

  # Джоба 3: Сборка готового JAR-файла (только если тесты прошли)
  build:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    name: Build JAR
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-tracker-jar
          path: build/libs/finance-tracker-*.jar
          retention-days: 5

  # Джоба 4: Автоматический деплой на сервер
  deploy:
    needs: build
    # Деплой сработает ТОЛЬКО при push в ветку main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to Server

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: finance-tracker-jar
          path: build/libs

      - name: Copy JAR to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/finance-tracker-*.jar"
          target: "/app/Finance_Tracker"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/Finance_Tracker
            git fetch origin main
            git reset --hard origin/main
            make run