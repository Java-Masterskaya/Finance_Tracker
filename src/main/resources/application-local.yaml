spring:
  # Конфигурация локальной БД H2
  datasource:
    url: jdbc:h2:mem:financeTracker
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5              # Меньше соединений для in-memory БД

  # H2 Web Console для тестирования
  h2:
    console:
      enabled: true
      path: /h2-console

  # Инициализация БД тестовыми данными при каждом запуске
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql # SQL скрипт с данными (src/main/resources)

  # JPA конфигурация для локальной разработки
  jpa:
    hibernate:
      ddl-auto: create-drop             # Пересоздаёт схему при старте и удаляет при завершении
    properties:
      hibernate:
        format_sql: true                # Форматирует SQL для читаемости
        dialect: org.hibernate.dialect.H2Dialect

  # Конфигурация кэша
  cache:
    type: redis

  # Redis конфигурация для локального кэша
  redis:
    host: localhost
    port: 6379

  # Kafka конфигурация
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: financeTrackerGroupLocal
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.yandex.finance_tracker"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1

# Логирование для локальной разработки
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.data: DEBUG
    org.springframework.boot.web: DEBUG
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application-local.log    # Файл логов для локальной сессии