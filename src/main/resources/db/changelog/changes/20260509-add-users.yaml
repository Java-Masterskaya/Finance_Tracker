databaseChangeLog:
  - changeSet:
      id: 20260509-001
      author: n5n1m2
      changes:
        - createTable:
            tableName: users
            remarks: "Таблица пользователей"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "PK, user id"

  - changeSet:
      id: 20260509-002
      author: n5n1m2
      changes:
        - addColumn:
            tableName: accounts
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  remarks: "Account holder"

        - addForeignKeyConstraint:
            baseTableName: accounts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_accounts_users
