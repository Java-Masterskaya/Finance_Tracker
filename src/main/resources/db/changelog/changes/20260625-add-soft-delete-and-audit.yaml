databaseChangeLog:
  - changeSet:
      id: 20260625-add-soft-delete-to-accounts
      author: iliaalii
      comment: Добавление полей мягкого удаления и аудита для таблицы счетов
      changes:
        - addColumn:
            tableName: accounts
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 20260625-add-soft-delete-to-transactions
      author: iliaalii
      comment: Добавление полей мягкого удаления и аудита для таблицы транзакций
      changes:
        - addColumn:
            tableName: transactions
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
