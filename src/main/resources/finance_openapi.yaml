openapi: 3.0.3
info:
  title: Personal Finance Tracker API
  version: 1.0.0
  description: API для приложения учета личных финансов
paths:
  /api/registration:
    post:
      summary: Регистрация нового пользователя
      description: Создает аккаунт и возвращает JWT-токен.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtResponse'
        '400':
          description: Ошибка валидации полей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Validation Failed"
                message: "password: User password length must be between 10 and 60 characters"
                status: 400
                timestamp: "2026-05-29 12:00:00"
        '409':
          description: Конфликт — email занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Conflict"
                message: "User with email user@example.com already exists"
                status: 409
                timestamp: "2026-05-29 12:00:00"

  /api/login:
    post:
      summary: Аутентификация пользователя (Вход в личный кабинет)
      description: Проверяет учетные данные и возвращает JWT-токен.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtResponse'
        '404':
          description: Пользователь не найден (не зарегистрирован)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Resource Not Found"
                message: "User with email = user2@example.com was not found"
                status: 404
                timestamp: "2026-05-29 12:00:00"
        '403':
          description: Ошибка ввода пароля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Forbidden"
                message: "/api/login"
                status: 403
                timestamp: "2026-05-29 12:00:00"

  /api/v1/accounts:
    get:
      summary: Получить список счетов пользователя
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: header
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Успешный ответ со списком счетов пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountInfoDto'
        '403':
          description: Не соответствие userId и токена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Access Denied"
                message: "Access denied: You do not have permission to access or modify another user's resources"
                status: 403
                timestamp: "2026-05-29 12:00:00"

    post:
      summary: Создание нового счета
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: header
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Счет успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoDto'
        '403':
          description: Не соответствие userId и токена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Access Denied"
                message: "Access denied: You do not have permission to access or modify another user's resources"
                status: 403
                timestamp: "2026-05-29 12:00:00"

  /api/v1/transactions:
    post:
      summary: Добавить новую транзакцию с поддержкой идемпотентности
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Транзакция успешно добавлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInfoDto'
        '400':
          description: Ошибка валидации или отсутствует Idempotency Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Idempotency key already in use"
                message: "Idempotency key is missing"
                status: 400
                timestamp: "2026-05-29 12:00:00"
        '409':
          description: Попытка отправить запрос с одним и тем же ключом идемпотентности
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Idempotency key already in use"
                message: "Duplicate request in progress"
                status: 409
                timestamp: "2026-05-29 12:00:00"

  /api/v1/accounts/{accountId}/transactions:
    get:
      summary: Получить историю транзакций по конкретному счету
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Страница с транзакциями

  /api/v1/reports/monthly:
    get:
      summary: Получить сводный отчет за месяц
      parameters:
        - name: userId
          in: header
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Отчет успешно сгенерирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReport'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegistrationRequest:
      type: object
      required:
        - email
        - password
        - firstName
      properties:
        email:
          type: string
          format: email
          minLength: 6
          maxLength: 60
          example: "user@example.com"
        password:
          type: string
          minLength: 10
          maxLength: 60
          example: "password1234567890"
        firstName:
          type: string
          minLength: 2
          maxLength: 30
          example: "Иван"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "password1234567890"

    JwtResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        email:
          type: string
          example: "user@example.com"
        role:
          type: string
          example: "ROLE_USER"

    AccountCreateRequest:
      type: object
      required:
        - name
        - currency
        - initialBalance
      properties:
        name:
          type: string
          example: "Инвестиционный счет"
        currency:
          type: string
          enum: [RUB, EUR, USD]
          example: "RUB"
        initialBalance:
          type: number
          format: float
          example: 5000.0

    AccountInfoDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Зарплатная карта"
        currency:
          type: string
          enum: [RUB, EUR, USD]
          example: "RUB"
        balance:
          type: number
          format: float
          example: 150500.50

    TransactionRequest:
      type: object
      required:
        - accountId
        - type
        - amount
        - category
        - date
      properties:
        accountId:
          type: integer
          format: int64
          example: 1
        type:
          type: string
          enum: [INCOME, EXPENSE]
          example: "EXPENSE"
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 1500.0
        category:
          type: string
          example: "Супермаркеты"
        date:
          type: string
          format: date
          example: "2026-05-24"
        description:
          type: string
          example: "Покупка продуктов"

    TransactionInfoDto:
      type: object
      properties:
        transactionId:
          type: integer
          format: int64
          example: 1
        type:
          type: string
          enum: [ INCOME, EXPENSE ]
          example: "EXPENSE"
        amount:
          type: number
          format: float
          example: 1500.00
        category:
          type: string
          example: "Супермаркеты"
        date:
          type: string
          format: date
          example: "2026-05-24"
        description:
          type: string
          example: "Покупка продуктов"
        accountId:
          type: integer
          format: int64
          example: 1
        accountName:
          type: string
          example: "Зарплатная карта"
        accountBalance:
          type: number
          format: float
          example: 98500.00

    MonthlyReport:
      type: object
      properties:
        totalIncome:
          type: number
          format: float
          example: 200000.0
        totalExpense:
          type: number
          format: float
          example: 45000.0
        expenseByCategory:
          type: object
          additionalProperties:
            type: number
            format: float
          example:
            "Супермаркеты": 25000.0
            "Транспорт": 5000.0
            "ЖКХ": 15000.0

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time
