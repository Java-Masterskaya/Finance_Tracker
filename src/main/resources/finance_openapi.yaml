openapi: 3.0.3
info:
  title: Personal Finance Tracker API
  version: 1.0.0
  description: API для приложения учета личных финансов
servers:
  - url: http://localhost:8080
    description: Локальный сервер
  - url: http://103.76.52.13:8080
    description: Удаленный тестовый сервер
paths:
  /api/registration:
    post:
      summary: Регистрация нового пользователя
      description: Создает аккаунт и возвращает JWT-токен.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtResponse'
        '400':
          description: Ошибка валидации входящих полей.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Validation Failed"
                message: "password: User password length must be between 10 and 60 characters"
                status: 400
                timestamp: "2026-06-24T17:15:00.000Z"

  /api/login:
    post:
      summary: Аутентификация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtResponse'

  /api/v1/accounts:
    get:
      summary: Получить список счетов пользователя
      security:
        - BearerAuth: [ ]
      responses:
        '200':
          description: Успешный ответ со списком счетов пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountInfoDto'
    post:
      summary: Создание нового счета
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Счет успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoDto'
        '400':
          description: Ошибка валидации полей счета

  /api/v1/accounts/{accountId}:
    put:
      summary: Обновить настройки счета
      security:
        - BearerAuth: [ ]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Счет успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfoDto'
        '400':
          description: Неверный формат данных
        '404':
          description: Счет не найден
    delete:
      summary: Удалить счет
      security:
        - BearerAuth: [ ]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Счет успешно удален (No Content)
        '404':
          description: Счет не найден

  /api/v1/accounts/{accountId}/transaction:
    get:
      summary: Получить историю транзакций по конкретному счету
      security:
        - BearerAuth: [ ]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Успешный ответ с пагинацией
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactionResponse'

  /api/v1/categories:
    get:
      summary: Получить список всех категорий
      responses:
        '200':
          description: Список категорий получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryInfoDto'
    post:
      summary: Создать новую категорию (Доступно только ADMIN)
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Категория создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryInfoDto'
        '400':
          description: Ошибка валидации имени категории
        '403':
          description: Доступ запрещен (не ADMIN)

  /api/v1/categories/{categoryId}:
    delete:
      summary: Удалить категорию (Доступно только ADMIN)
      security:
        - BearerAuth: [ ]
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Категория удалена
        '403':
          description: Доступ запрещен

  /api/v1/transactions:
    post:
      summary: Добавить новую транзакцию с поддержкой идемпотентности
      security:
        - BearerAuth: [ ]
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Транзакция успешно добавлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInfoDto'
        '400':
          description: Ошибка бизнес-логики или валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                InsufficientFunds:
                  summary: Нехватка средств
                  value:
                    error: "Insufficient Funds"
                    message: "Недостаточно средств на счете. Баланс: 0.00, Попытка списания: 5000.00"
                    status: 400
                    timestamp: "2026-06-24T17:15:00.000Z"
                CurrencyMismatch:
                  summary: Несовпадение валюты
                  value:
                    error: "Currency Mismatch"
                    message: "Несовпадение валюты. Валюта счёта ID = 1 - RUB, валюта операции - USD"
                    status: 400
                    timestamp: "2026-06-24T17:15:00.000Z"
                ValidationFailed:
                  summary: Ошибка формата данных
                  value:
                    error: "Validation Failed"
                    message: "amount: Минимальная сумма транзакции — 0.01"
                    status: 400
                    timestamp: "2026-06-24T17:15:00.000Z"
        '409':
          description: Конфликт параллельной обработки ключа идемпотентности.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                error: "Idempotency key already in use"
                message: "Duplicate request in progress"
                status: 409
                timestamp: "2026-06-24T17:15:00.000Z"

  /api/v1/transactions/{transactionId}:
    put:
      summary: Изменить существующую транзакцию
      security:
        - BearerAuth: [ ]
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdateRequest'
      responses:
        '200':
          description: Транзакция успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInfoDto'
    delete:
      summary: Удалить транзакцию
      security:
        - BearerAuth: [ ]
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Транзакция удалена

  /api/v1/reports/monthly:
    get:
      summary: Получить сводный отчет за месяц
      security:
        - BearerAuth: [ ]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
            example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 6
      responses:
        '200':
          description: Отчет успешно сгенерирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReportDto'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegistrationRequest:
      type: object
      required: [ email, password, firstName, timezone ]
      properties:
        email:
          type: string
          format: email
          minLength: 6
          maxLength: 60
          example: "user@example.com"
        password:
          type: string
          minLength: 10
          maxLength: 60
          example: "password1234567890"
        firstName:
          type: string

    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "password1234567890"

    JwtResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        email:
          type: string
          example: "user@example.com"
        role:
          type: string
          example: "ROLE_USER"

    AccountCreateRequest:
      type: object
      required: [ name, currency, initialBalance, overdraftAllowed ]
      properties:
        name:
          type: string
          maxLength: 100
          example: "Инвестиционный счет"
        currency:
          type: string
          enum: [ RUB, EUR, USD ]
          example: "RUB"
        initialBalance:
          type: number
          format: decimal
          minimum: 0
          example: 5000.00
        overdraftAllowed:
          type: boolean
          example: false

    AccountUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          example: "Новое название счета"
        overdraftAllowed:
          type: boolean
          example: true

    AccountInfoDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Зарплатная карта"
        currency:
          type: string
          enum: [ RUB, EUR, USD ]
          example: "RUB"
        balance:
          type: number
          format: decimal
          example: 150000.50
        overdraftAllowed:
          type: boolean

    CategoryCreateRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 50
          example: "Продукты"

    CategoryInfoDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Продукты"

    CategoryExpenseDto:
      type: object
      properties:
        category:
          type: string
          example: "Супермаркеты"
        totalExpense:
          type: number
          format: decimal
          example: 25400.00

    MonthlyReportDto:
      type: object
      properties:
        totalIncome:
          type: number
          format: decimal
          example: 120000.00
        totalExpense:
          type: number
          format: decimal
          example: 45000.00
        balanceDifference:
          type: number
          format: decimal
          example: 75000.00
        expenseByCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryExpenseDto'

    TransactionRequest:
      type: object
      required: [ accountId, type, amount, currency, categoryId, date ]
      properties:
        accountId:
          type: integer
          format: int64
          minimum: 1
          example: 1
        type:
          type: string
          enum: [ INCOME, EXPENSE ]
          example: "EXPENSE"
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 1500.00
        currency:
          type: string
          enum: [ RUB, EUR, USD ]
          example: "RUB"
        categoryId:
          type: integer
          format: int64
          minimum: 1
          example: 2
        date:
          type: string
          format: date-time
          example: "2026-06-24T14:30:00.000Z"
        description:
          type: string
          maxLength: 300
          example: "Покупка продуктов"

    TransactionUpdateRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 1800.00
        type:
          type: string
          enum: [ INCOME, EXPENSE ]
        categoryId:
          type: integer
          format: int64
          minimum: 1
        date:
          type: string
          format: date-time
          example: "2026-06-24T15:00:00.000Z"
        description:
          type: string
          maxLength: 300

    TransactionInfoDto:
      type: object
      properties:
        transactionId:
          type: integer
          format: int64
          example: 105
        accountId:
          type: integer
          format: int64
          example: 1
        type:
          type: string
          enum: [ INCOME, EXPENSE ]
        amount:
          type: number
          format: decimal
          example: 1500.00
        category:
          type: string
          example: "Продукты"
        date:
          type: string
          format: date-time
          example: "2026-06-24T14:30:00.000Z"
        description:
          type: string
          example: "Покупка продуктов"
        accountBalance:
          type: number
          format: decimal
          example: 98500.00

    PagedTransactionResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionInfoDto'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 3

    ApiError:
      type: object
      required: [ error, message, status, timestamp ]
      properties:
        error:
          type: string
        message:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time
